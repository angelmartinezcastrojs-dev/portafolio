<div *ngIf="isOpen" 
     class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-in fade-in duration-300"
     (click)="closeModal()">
  
  <div class="bg-white rounded-[2.5rem] w-full max-w-3xl max-h-[85vh] overflow-hidden shadow-2xl flex flex-col animate-in zoom-in duration-300"
       (click)="$event.stopPropagation()">
    
    <!-- Modal Header -->
    <div class="bg-[#ffd54f] p-8 flex justify-between items-center relative overflow-hidden">
      <!-- Decorative background -->
      <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/20 rounded-full"></div>
      
      <div class="relative z-10 flex items-center gap-4">
        <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm">
          <fa-icon [icon]="faCertificate" class="text-2xl text-[#5f4900]"></fa-icon>
        </div>
        <div>
          <h2 class="text-2xl font-black text-[#5f4900] tracking-tight leading-none">Certifications</h2>
          <p class="text-[10px] font-black uppercase tracking-widest text-[#5f4900] opacity-60 mt-1">Academic Background</p>
        </div>
      </div>

      <button (click)="closeModal()" 
              class="relative z-10 w-10 h-10 flex items-center justify-center bg-white/20 hover:bg-white/40 text-[#5f4900] rounded-full transition-all cursor-pointer">
        <fa-icon [icon]="faTimes" class="text-xl"></fa-icon>
      </button>
    </div>

    <!-- Modal Content -->
    <div class="flex-1 overflow-y-auto p-8 bg-[#f3f4f6]">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        @for (cert of certificates; track cert.title) {
          <div class="bg-white rounded-[2rem] p-6 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all group relative overflow-hidden flex flex-col justify-between">
            <!-- Institution Logo if available -->
            <div class="flex items-start justify-between mb-4">
              <div *ngIf="cert.logo" class="h-10 w-auto opacity-40 group-hover:opacity-100 transition-opacity">
                <img [src]="cert.logo" [alt]="cert.institution" class="h-full object-contain max-w-[120px]">
              </div>
              <span class="text-[8px] font-black uppercase tracking-widest bg-gray-100 px-3 py-1 rounded-full text-gray-400 group-hover:bg-[#ffd54f]/20 group-hover:text-[#5f4900] transition-colors">
                {{ cert.date }}
              </span>
            </div>

            <div>
              <h3 class="text-lg font-black tracking-tight mb-2 group-hover:text-[#7c5dfa] transition-colors leading-snug">
                {{ cert.title }}
              </h3>
              <p class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-6">
                {{ cert.institution }}
              </p>
            </div>

            <button (click)="goToCertificate(cert.url)" 
               class="w-full py-3 bg-black text-white rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-[#7c5dfa] transition-all transform hover:shadow-lg cursor-pointer">
              View Certificate
              <fa-icon [icon]="faExternalLinkAlt" class="text-[8px]"></fa-icon>
            </button>
          </div>
        }
      </div>
    </div>

    <!-- Modal Footer -->
    <div class="bg-white p-6 text-center border-t border-black/5">
      <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">
        {{ certificates.length }} Total Certifications
      </p>
    </div>
  </div>
</div>
